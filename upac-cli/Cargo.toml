[package]
name = "upac"
version = "0.1.0"
edition = "2021"

[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "target-feature=+crt-static"]

[dependencies]
clap       = { version = "4", features = ["derive"] }
serde      = { version = "1", features = ["derive"] }
indicatif  = { version = "0.17" }
libloading = { version = "0.8" }
toml       = { version = "0.8" }
colored    = { version = "2" }
anyhow     = { version = "1" }
