name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:



jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
     contents: write
    container:
      image: archlinux:latest

    steps:
      # ── Подготовка окружения ──────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            git \
            base-devel \
            rust \
            ostree \
            glib2 \
            libarchive \
            zstd

      - name: Install Zig 0.13
        run: |
          curl -L https://ziglang.org/download/0.13.0/zig-linux-x86_64-0.13.0.tar.xz | tar -xJ
          echo "$(pwd)/zig-linux-x86_64-0.13.0" >> $GITHUB_PATH

      # ── Arch пакет ───────────────────────────────────────────────────────
      - name: Build Arch package
        run: |
          useradd -m builder
          chown -R builder .
          su - builder -c "make -C $(pwd) pkg-arch"

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version' upac-cli/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          PKGREL=$(grep '^pkgrel' PKGBUILD | head -1 | sed 's/pkgrel=//')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "pkg=upac-${VERSION}-${PKGREL}-x86_64.pkg.tar.zst" >> $GITHUB_OUTPUT

      # ── Релиз на GitHub ───────────────────────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "upac v${{ steps.version.outputs.version }}"
          body: |
            ## Installation

            ### Arch Linux
            ```bash
            pacman -U upac-${{ steps.version.outputs.version }}-x86_64.pkg.tar.zst
            ```

            ### Manual
            Copy `libupac.so` and `libupac-backend-arch.so` to `/usr/lib/`,
            `upac` binary to `/usr/bin/`, and create `/etc/upac/config.toml`
            from the provided example.
          files: |
            pkg/arch/${{ steps.version.outputs.pkg }}
            config.toml.example
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
